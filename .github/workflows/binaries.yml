name: Binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: binaries-${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
            client: target/release/yank-client
            server: target/release/yank-server
            exe_suffix: ""
          - os: ubuntu-24.04-arm
            artifact: linux-arm64
            client: target/release/yank-client
            server: target/release/yank-server
            exe_suffix: ""
          - os: macos-latest
            artifact: macos-arm64
            client: target/release/yank-client
            server: target/release/yank-server
            exe_suffix: ""
          - os: windows-latest
            artifact: windows-x86_64
            client: target/release/yank-client.exe
            server: target/release/yank-server.exe
            exe_suffix: ".exe"
          - os: windows-11-arm
            artifact: windows-arm64
            client: target/release/yank-client.exe
            server: target/release/yank-server.exe
            exe_suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libasound2-dev libpulse-dev

      - name: Build release binaries
        run: cargo build --locked --release -p yank-client -p yank-server

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.client }}" "dist/yank-client-${{ github.ref_name }}-${{ matrix.artifact }}${{ matrix.exe_suffix }}"
          cp "${{ matrix.server }}" "dist/yank-server-${{ github.ref_name }}-${{ matrix.artifact }}${{ matrix.exe_suffix }}"
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > "SHA256SUMS-${{ matrix.artifact }}.txt"
          else
            shasum -a 256 * > "SHA256SUMS-${{ matrix.artifact }}.txt"
          fi

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
          fi
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
