name: Binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  build:
    name: binaries-${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
            client: target/release/yank-client
            server: target/release/yank-server
            exe_suffix: ""
          - os: ubuntu-24.04-arm
            artifact: linux-arm64
            client: target/release/yank-client
            server: target/release/yank-server
            exe_suffix: ""
          - os: macos-latest
            artifact: macos-arm64
            client: target/release/yank-client
            server: target/release/yank-server
            exe_suffix: ""
          - os: windows-latest
            artifact: windows-x86_64
            client: target/release/yank-client.exe
            server: target/release/yank-server.exe
            exe_suffix: ".exe"
          - os: windows-11-arm
            artifact: windows-arm64
            client: target/release/yank-client.exe
            server: target/release/yank-server.exe
            exe_suffix: ".exe"

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure public GitHub git dependencies
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libasound2-dev libpulse-dev libegl1 libgl1-mesa-dri xvfb

      - name: Build release binaries
        run: cargo build --locked --release -p yank-client -p yank-server

      - name: Smoke test Linux client startup
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set +e
          timeout 10s xvfb-run -a "${{ matrix.client }}" > client-smoke.log 2>&1
          status=$?
          cat client-smoke.log
          if grep -E "Apply error|no matching field|Cannot find main file id|Could not load resource|File! open failed|RightWrap does not support fill childnodes" client-smoke.log; then
            exit 1
          fi
          if grep -q "panicked at" client-smoke.log && ! grep -q "can't load LibEGL" client-smoke.log; then
            exit 1
          fi
          if [ "$status" -ne 0 ] && grep -q "can't load LibEGL" client-smoke.log; then
            exit 0
          fi
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            exit "$status"
          fi

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.client }}" "dist/yank-client-${{ github.ref_name }}-${{ matrix.artifact }}${{ matrix.exe_suffix }}"
          cp "${{ matrix.server }}" "dist/yank-server-${{ github.ref_name }}-${{ matrix.artifact }}${{ matrix.exe_suffix }}"
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > "SHA256SUMS-${{ matrix.artifact }}.txt"
          else
            shasum -a 256 * > "SHA256SUMS-${{ matrix.artifact }}.txt"
          fi

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-assets-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download release assets
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
          fi
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
