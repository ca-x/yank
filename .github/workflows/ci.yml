name: CI

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure public GitHub git dependencies
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 10
        run: |
          sudo apt-get -o Acquire::Retries=3 -o Dpkg::Lock::Timeout=120 update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libx11-dev libxcursor-dev libasound2-dev libpulse-dev libwayland-dev libxkbcommon-dev

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Typecheck
        run: cargo check --workspace
